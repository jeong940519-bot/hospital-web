<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>새이름 병원</title>
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:'Noto Sans KR',sans-serif;background:#eee}
  #loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#445;text-align:center;line-height:1.7}
  #loading .spin{width:34px;height:34px;border:3px solid #ccd;border-top-color:#2b6cff;border-radius:50%;animation:sp 0.8s linear infinite}
  #loading a{color:#2b6cff;font-weight:700;text-decoration:none}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
<script src="site-render.js"></script>
</head>
<body>
<div id="loading"><div class="spin"></div><div>홈페이지를 불러오는 중…</div></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const app = initializeApp({
  apiKey:"AIzaSyDq3LRPvBDn1ZH6UDMPGDH_-LC7JnsEhLg",
  authDomain:"newworld-1a1d5.firebaseapp.com",
  projectId:"newworld-1a1d5",
  storageBucket:"newworld-1a1d5.firebasestorage.app",
  messagingSenderId:"948363397391",
  appId:"1:948363397391:web:5d7dee7a383f3bdec0167a"
});
const db = getFirestore(app);

(async ()=>{
  try{
    const snap = await getDoc(doc(db, 'site', 'editorProject'));
    if(!snap.exists() || !snap.data().data){ showEmpty(); return; }
    const project = JSON.parse(snap.data().data);
    if(!project.pages || !project.pages.length){ showEmpty(); return; }
    const baseW = (project.pages[0] && project.pages[0].w) || 1200;
    const html = SiteRender.buildSiteHtml(project, baseW);
    document.open(); document.write(html); document.close();
  }catch(e){
    document.getElementById('loading').innerHTML = '<div>홈페이지를 불러오지 못했습니다.</div><div style="font-size:13px;color:#889">'+(e.message||e)+'</div>';
  }
})();

function showEmpty(){
  document.getElementById('loading').innerHTML =
    '<div style="font-size:18px;font-weight:700">아직 발행된 홈페이지가 없습니다</div>'
    + '<div style="font-size:14px;color:#667">편집기에서 만든 뒤 <b>☁ 클라우드</b>로 저장하면 여기에 표시됩니다.</div>'
    + '<a href="/editor.html">편집기로 이동 →</a>';
}
</script>
</body>
</html>
